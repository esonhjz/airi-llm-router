# One-command sandbox: `docker compose up`
#
# Services
# ────────
#  router  — Airi LLM Router (this repo)
#
# Ollama
# ──────
# This compose file assumes Ollama is running natively on the Windows host.
# The router reaches it via `host.docker.internal` (Docker's magic DNS that
# resolves to the host machine's loopback address from inside a container).
#
# Quickstart
# ──────────
#   cp .env.example .env          # fill in your model name
#   docker compose up --build -d  # build router image and start
#   docker compose logs -f        # tail logs
#   docker compose down           # stop and remove containers

services:

  # ─── Airi LLM Router ───────────────────────────────────────────────────────
  router:
    build:
      context: .
      dockerfile: Dockerfile
      # Cache the builder stage between runs — speeds up incremental rebuilds.
      target: runtime
    image: airi-llm-router:latest
    container_name: airi-router
    restart: unless-stopped
    ports:
      - "${ROUTER_PORT:-8000}:8000"
    environment:
      # Forward all variables from the host .env file into the container.
      # Any value set here overrides the default defined in src/config.py.
      #
      # host.docker.internal lets the container reach the Windows-native Ollama
      # that is listening on the host's localhost:11434.
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-AiriLocal}
      QUEUE_MAX_SIZE: ${QUEUE_MAX_SIZE:-64}
      QUEUE_WORKER_COUNT: ${QUEUE_WORKER_COUNT:-4}
      UPSTREAM_MAX_RETRIES: ${UPSTREAM_MAX_RETRIES:-3}
      WARMUP_ENABLED: ${WARMUP_ENABLED:-true}
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      MODEL_ROUTES: ${MODEL_ROUTES:-{}}
      DEFAULT_ADAPTER: ${DEFAULT_ADAPTER:-ollama}
      IMAGE_OFFLOAD_ENABLED: ${IMAGE_OFFLOAD_ENABLED:-true}
      VRAM_MONITOR_ENABLED: ${VRAM_MONITOR_ENABLED:-true}
      VRAM_GPU_INDEX: ${VRAM_GPU_INDEX:-0}
      VRAM_THRESHOLD_WARNING: ${VRAM_THRESHOLD_WARNING:-75.0}
      VRAM_THRESHOLD_DANGER: ${VRAM_THRESHOLD_DANGER:-85.0}
    networks:
      - airi-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# ─── Internal bridge network ─────────────────────────────────────────────────
networks:
  airi-net:
    driver: bridge
